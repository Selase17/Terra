name: Security Scanning

on:
  push:
    branches: [main, feat/initial-infrastructure]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: "Trivy IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  checkov:
    name: "Checkov Policy Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: "."
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif
          skip_check: "CKV_AWS_79,CKV_AWS_382,CKV_AWS_260,CKV2_AWS_5,CKV2_AWS_12,CKV_AWS_378,CKV2_AWS_28,CKV2_AWS_64,CKV_AWS_157,CKV_AWS_353,CKV2_AWS_69,CKV_AWS_158,CKV_AWS_338"

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  gitleaks:
    name: "Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true