name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results

jobs:
  # ─────────────────────────────────────────────
  # Trivy — IaC misconfiguration scanner
  # ─────────────────────────────────────────────
  trivy:
    name: "Trivy IaC Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (config scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ─────────────────────────────────────────────
  # Checkov — Terraform policy-as-code scanner
  # ─────────────────────────────────────────────
  checkov:
    name: "Checkov Policy Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: "."
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          # Skip checks that are intentionally handled differently in this config:
          # CKV_AWS_79  - IMDSv2 enforced via launch template metadata_options
          skip_check: "CKV_AWS_79"

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ─────────────────────────────────────────────
  # Terrascan — policy-as-code (Open Policy Agent)
  # ─────────────────────────────────────────────
  terrascan:
    name: "Terrascan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: terraform
          iac_version: v15
          policy_type: aws
          only_warn: false
          sarif_upload: true

      - name: Upload Terrascan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terrascan.sarif
          category: terrascan

  # ─────────────────────────────────────────────
  # Gitleaks — git history secret scanner
  # ─────────────────────────────────────────────
  gitleaks:
    name: "Gitleaks Secret Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # detect-secrets — pre-commit baseline validator
  # ─────────────────────────────────────────────
  detect-secrets:
    name: "detect-secrets"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          # Baseline should already exist; this validates no new secrets were added
          if [ -f .secrets.baseline ]; then
            detect-secrets-hook --baseline .secrets.baseline $(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          else
            echo "No .secrets.baseline found — creating one now"
            detect-secrets scan > .secrets.baseline
            echo "Commit the generated .secrets.baseline to enable incremental scanning"
          fi
